{% extends "base.html" %}

{% block header_title %}{{ '编辑礼物' if gift else '添加礼物' }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="glass-card p-8">
    <div class="flex items-center gap-3 mb-6">
      <a href="{{ url_for('gift_admin.index') }}" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
        <i data-lucide="arrow-left" width="20" height="20"></i>
      </a>
      <h2 class="text-xl font-bold text-slate-800 dark:text-white">{{ '编辑礼物' if gift else '添加礼物' }}</h2>
    </div>

    <form method="post" action="{{ url_for('gift_admin.edit', gift_id=gift.id) if gift else url_for('gift_admin.add') }}" enctype="multipart/form-data" class="space-y-5">
      {# 礼物图片 #}
      <div>
        <label class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-2 block">礼物图片</label>
        {% if gift and gift.image %}
        <div class="mb-2">
          <img src="{{ url_for('static', filename=gift.image) }}" class="w-16 h-16 rounded-xl object-cover" alt="">
        </div>
        {% endif %}
        <input type="file" name="image" accept="image/*"
          class="w-full text-sm text-slate-800 dark:text-white file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 dark:file:bg-purple-900/30 dark:file:text-purple-300">
      </div>

      {# 名称 #}
      <div>
        <label class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-2 block">礼物名称</label>
        <input type="text" name="name" value="{{ gift.name if gift else '' }}" required
          class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      {# 价格 #}
      <div>
        <label class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-2 block">礼物价格 (嗯呢币)</label>
        <input type="number" name="price" value="{{ gift.price if gift else '' }}" step="0.01" min="0" required
          class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>

      {# 类型 #}
      <div>
        <label class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-2 block">礼物类型</label>
        <select name="gift_type"
          class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
          <option value="standard" {% if gift and gift.gift_type == 'standard' %}selected{% endif %}>标准</option>
          <option value="crown" {% if gift and gift.gift_type == 'crown' %}selected{% endif %}>冠名</option>
        </select>
      </div>

      {# 状态 #}
      <div class="flex items-center gap-3">
        <input type="checkbox" name="status" id="status" {% if not gift or gift.status %}checked{% endif %}
          class="w-4 h-4 rounded border-slate-300 text-purple-600 focus:ring-purple-500">
        <label for="status" class="text-sm font-medium text-slate-700 dark:text-slate-300">开启</label>
      </div>

      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-medium transition-colors">
        {{ '保存修改' if gift else '添加礼物' }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
